<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Check Firebase Items</title>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const config = {
      apiKey: "AIzaSyA0JgY0hTlnXZSVg3WQGfKhVm7ij0sTy-s",
      authDomain: "dictpropstore.firebaseapp.com",
      projectId: "dictpropstore",
      storageBucket: "dictpropstore.firebasestorage.app",
      messagingSenderId: "340564794762",
      appId: "1:340564794762:web:23e2bb5a14c9f8c8d43c73"
    };

    const app = initializeApp(config);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    let currentUser = null;

    onAuthStateChanged(auth, (user) => {
      currentUser = user;
      if (user) {
        document.getElementById('user-info').innerHTML = `<p style="color: green;">✅ Signed in as: ${user.email}</p>`;
        document.getElementById('check-btn').disabled = false;
      } else {
        document.getElementById('user-info').innerHTML = '<p style="color: red;">❌ Not signed in</p>';
        document.getElementById('check-btn').disabled = true;
      }
    });

    window.signIn = async () => {
      try {
        await signInWithPopup(auth, provider);
      } catch (error) {
        console.error('Sign in error:', error);
        alert('Sign in failed: ' + error.message);
      }
    };

    window.checkItems = async () => {
      if (!currentUser) {
        alert('Please sign in first');
        return;
      }

      const output = document.getElementById('output');
      output.innerHTML = '<p>🔍 Checking Firebase items...</p>';

      try {
        // Get items from subcollection
        const itemsCollection = collection(db, "users", currentUser.uid, "items");
        const snapshot = await getDocs(itemsCollection);
        
        const items = [];
        snapshot.forEach((doc) => {
          items.push({
            id: doc.id,
            ...doc.data()
          });
        });

        const activeItems = items.filter(item => !item.isDeleted);
        const deletedItems = items.filter(item => item.isDeleted);

        let html = `
          <div style="background: #e3f2fd; padding: 20px; border-radius: 8px; margin: 20px 0;">
            <h3>📊 Firebase Items Collection</h3>
            <p><strong>Total items:</strong> ${items.length}</p>
            <p><strong>Active items:</strong> ${activeItems.length}</p>
            <p><strong>Deleted items:</strong> ${deletedItems.length}</p>
          </div>
        `;

        if (activeItems.length > 0) {
          html += '<div style="background: white; padding: 20px; border-radius: 8px;"><h4>Active Items:</h4><ul>';
          activeItems.forEach(item => {
            const word = item.type === 'vocab' ? item.data?.word : item.data?.query;
            html += `<li><strong>${word || 'Unknown'}</strong> (${item.type}) - ID: ${item.data?.id}</li>`;
          });
          html += '</ul></div>';
        }

        if (deletedItems.length > 0) {
          html += '<div style="background: #ffebee; padding: 20px; border-radius: 8px; margin-top: 20px;"><h4>Deleted Items:</h4><ul>';
          deletedItems.forEach(item => {
            const word = item.type === 'vocab' ? item.data?.word : item.data?.query;
            html += `<li><strong>${word || 'Unknown'}</strong> (${item.type})</li>`;
          });
          html += '</ul></div>';
        }

        output.innerHTML = html;

      } catch (error) {
        console.error('Check error:', error);
        output.innerHTML = `<p style="color: red;">❌ Error: ${error.message}</p>`;
      }
    };
  </script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
      background: #fafafa;
    }
    h1 {
      color: #333;
    }
    button {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 15px 30px;
      font-size: 18px;
      border-radius: 6px;
      cursor: pointer;
      margin: 10px 5px;
    }
    button:hover:not(:disabled) {
      background: #45a049;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    #user-info {
      background: white;
      padding: 15px;
      border-radius: 8px;
      margin: 20px 0;
    }
    #output {
      margin: 20px 0;
    }
  </style>
</head>
<body>
  <h1>🔍 Check Firebase Items</h1>
  <p>This tool shows exactly what items are in your Firebase database.</p>

  <div id="user-info">
    <p>Loading...</p>
  </div>

  <div>
    <button onclick="signIn()">Sign In with Google</button>
    <button id="check-btn" onclick="checkItems()" disabled>Check Items</button>
  </div>

  <div id="output"></div>
</body>
</html>
